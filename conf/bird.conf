/*
 * Local settings: router id, MY_AS, logging.
 * Create this file with your own values, e.g.:
 *
 *   log syslog all;
 *   router id 10.0.0.1;
 *   define MY_AS = 65000;
 */
include "/etc/bird/local-settings.conf";

/*
 * BGP Communities — organized by semantic group:
 *   100..199 — RU resources (route via local Russian channel)
 *   200..299 — RKN blocked subnets (route around blocking)
 *   300..399 — Foreign services (also typically routed around blocking)
 */

# --- RU resources (100..199) ---
define COMM_RU_COMBINED   = (MY_AS, 100);   # whole RU country prefix list (RIPEstat)
define COMM_GOV_NETS      = (MY_AS, 110);   # .gov.ru and similar (antifilter govno.lst)

# --- RKN blocked subnets (200..299) ---
define COMM_BLOCKED_IP    = (MY_AS, 200);   # antifilter ip.lst
define COMM_RKN_SUBNETS   = (MY_AS, 210);   # antifilter subnet.lst

# --- Foreign services (300..399) ---
define COMM_OFFICIAL_SVC  = (MY_AS, 300);   # Telegram, Cloudflare, Google, local custom.lst
define COMM_CUSTOM_USER   = (MY_AS, 310);   # antifilter custom.lst
define COMM_STRIPE        = (MY_AS, 320);
define COMM_BYTEDANCE     = (MY_AS, 330);
define COMM_AKAMAI        = (MY_AS, 340);
define COMM_ROBLOX        = (MY_AS, 350);
define COMM_PINTEREST     = (MY_AS, 360);
define COMM_FASTLY        = (MY_AS, 370);
define COMM_META          = (MY_AS, 380);
define COMM_TWITTER       = (MY_AS, 381);
define COMM_NETFLIX       = (MY_AS, 382);
define COMM_AWS_CLOUDFRONT = (MY_AS, 383);
define COMM_YOUTUBE       = (MY_AS, 386);

/* Dedicated table for exported prefixes */
ipv4 table t_bgp_prefixes;

protocol device {
    scan time 10;
}

/* Load generated prefixes */
protocol static bgp_prefixes {
    ipv4 { table t_bgp_prefixes; };
    include "/etc/bird/prefixes.bird";
}

/* --- Export Filters --- */

# Filter: Export ONLY Russian resources (RU country + gov networks).
# Use for peers that should route only RU traffic locally.
filter export_only_ru {
    if (bgp_community ~ [(MY_AS, 100..199)]) then accept;
    reject;
}

# Filter: Export ONLY blocked subnets and foreign services, NOT Russian resources.
# Use for peers that need to bypass RKN blocking but should not get RU prefixes.
filter export_blocked_lists {
    if (bgp_community ~ [(MY_AS, 200..399)]) then accept;
    reject;
}

# Filter: Export only blocked subnets (RKN), without foreign services.
filter export_blocked_only {
    if (bgp_community ~ [(MY_AS, 200..299)]) then accept;
    reject;
}

# Filter: Export only foreign services (Stripe, CDNs, etc.), without RKN list.
filter export_services_only {
    if (bgp_community ~ [(MY_AS, 300..399)]) then accept;
    reject;
}

# Multi-filter example: Complex logic
filter export_complex_logic {
    # Accept user custom lists explicitly
    if (COMM_CUSTOM_USER ~ bgp_community) then accept;

    # Reject RU mainland (100) explicitly
    if (COMM_RU_COMBINED ~ bgp_community) then reject;

    # Accept everything else from our static prefixes
    if (proto = "bgp_prefixes") then accept;

    reject;
}

/* Template for BGP clients */
template bgp t_client {
    local as MY_AS;
    multihop;
    hold time 240;
    passive on;
    ipv4 {
        table t_bgp_prefixes;
        import none;
        export filter {
            if proto = "bgp_prefixes" then accept;
            reject;
        };
        next hop self;
        export limit 200000 action disable;
    };
}

# BGP peers - create per-peer configs in /etc/bird/peers.d/*.conf
include "/etc/bird/peers.d/*.conf";
